<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Sleek realistic emerald icon">
  <defs>
    <linearGradient id="emeraldBase" x1="18" y1="10" x2="108" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dfffee"/>
      <stop offset="14%" stop-color="#95f6c1"/>
      <stop offset="38%" stop-color="#34cb7d"/>
      <stop offset="68%" stop-color="#13955b"/>
      <stop offset="100%" stop-color="#0a643f"/>
    </linearGradient>

    <linearGradient id="tableTop" x1="64" y1="18" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5fff9" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a4ffd0" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="centerFace" x1="64" y1="30" x2="64" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d9ffee" stop-opacity="0.78"/>
      <stop offset="50%" stop-color="#6ce4a2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14784c" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="leftFace" x1="24" y1="34" x2="58" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c7ffdf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0b7e4d" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="rightFace" x1="102" y1="34" x2="70" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#edfff6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0b7e4d" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="bottomFace" x1="64" y1="90" x2="64" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#85efb6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e6fff2" stop-opacity="0.32"/>
    </linearGradient>

    <radialGradient id="internalLight" cx="45%" cy="34%" r="56%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="28%" stop-color="#d8ffee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#00150d" flood-opacity="0.14"/>
    </filter>

    <clipPath id="gemClip">
      <polygon points="44,12 84,12 108,36 108,84 84,116 44,116 20,84 20,36"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <!-- body -->
    <polygon points="44,12 84,12 108,36 108,84 84,116 44,116 20,84 20,36"
             fill="url(#emeraldBase)"/>

    <g clip-path="url(#gemClip)">
      <!-- simplified realistic facets -->
      <polygon points="44,12 64,24 84,12 76,38 52,38" fill="url(#tableTop)"/>
      <polygon points="52,38 76,38 64,96" fill="url(#centerFace)"/>
      <polygon points="20,36 44,12 52,38 34,62" fill="url(#leftFace)"/>
      <polygon points="108,36 84,12 76,38 94,62" fill="url(#rightFace)"/>
      <polygon points="34,62 52,38 64,96 44,116 20,84" fill="url(#leftFace)"/>
      <polygon points="94,62 76,38 64,96 84,116 108,84" fill="url(#rightFace)"/>
      <polygon points="44,116 64,96 84,116 64,108" fill="url(#bottomFace)"/>

      <!-- soft internal reflection -->
      <ellipse cx="58" cy="50" rx="30" ry="28" fill="url(#internalLight)"/>

      <!-- restrained facet lines -->
      <path d="M44 12L52 38L34 62L20 36" fill="none" stroke="#f2fff8" stroke-opacity="0.16" stroke-width="1.2"/>
      <path d="M84 12L76 38L94 62L108 36" fill="none" stroke="#f2fff8" stroke-opacity="0.14" stroke-width="1.2"/>
      <path d="M52 38L64 24L76 38" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.1"/>
      <path d="M52 38L64 96L76 38" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.1"/>
      <path d="M34 62L64 96L94 62" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.1"/>

      <!-- subtle edge highlight -->
      <path d="M33 28C39 21 44 17 52 15" fill="none" stroke="#ffffff" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- outer cut line -->
    <polygon points="44,12 84,12 108,36 108,84 84,116 44,116 20,84 20,36"
             fill="none" stroke="#f4fff9" stroke-opacity="0.24" stroke-width="1.8"/>
  </g>
</svg>
